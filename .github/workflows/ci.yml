name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: ONNX audio-thread guardrail (ONNX-03)
        run: ./scripts/check_onnx_audio_thread.sh

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DMA_BUILD_STANDALONE=ON

      - name: Build plugin and tests
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --config Release

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prep MIDI smoke (Phase 9)
        run: |
          python3 -m pip install -r training/requirements.txt
          python3 training/prep_midi.py --input training/fixtures/minimal.mid --output /tmp/ci_prep_out.json
          test -s /tmp/ci_prep_out.json
