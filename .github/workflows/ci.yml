name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  macos:
    runs-on: macos-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC, optional)
        if: github.event.repository.fork == false && vars.AWS_MODEL_BUCKET != '' && secrets.AWS_CI_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: us-east-1

      - name: Download model from S3 (optional)
        if: github.event.repository.fork == false && vars.AWS_MODEL_BUCKET != '' && secrets.AWS_CI_ROLE_ARN != ''
        env:
          MODEL_BUCKET: ${{ vars.AWS_MODEL_BUCKET }}
        run: ./scripts/download-model.sh

      - name: ONNX audio-thread guardrail (ONNX-03)
        run: ./scripts/check_onnx_audio_thread.sh

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DMA_BUILD_STANDALONE=ON

      - name: Build plugin and tests
        run: cmake --build build --config Release --parallel

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure --config Release -L unit

      - name: Run integration tests
        run: ctest --test-dir build --output-on-failure --config Release -L integration

      - name: Run E2E tests
        run: ctest --test-dir build --output-on-failure --config Release -L e2e

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python3 -m pip install -r training/requirements.txt pytest

      - name: Run Python tests
        working-directory: training
        run: python3 -m pytest tests/ -v --tb=short

      - name: ONNX contract validation (Phase 22)
        if: always()
        run: |
          python3 scripts/build_minimal_structure_onnx.py
          python3 scripts/build_minimal_bass_onnx.py
          python3 scripts/validate_onnx_contract.py --structure assets/structure_model.onnx
          python3 scripts/validate_onnx_contract.py --bass assets/bass_model.onnx
          echo "ONNX contract validation passed"

      - name: Download ONNX Runtime (ONNX smoke)
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then
            ONNX_ARCH="arm64"
          else
            ONNX_ARCH="x86_64"
          fi
          ONNX_URL="https://github.com/microsoft/onnxruntime/releases/download/v1.20.1/onnxruntime-osx-${ONNX_ARCH}-1.20.1.tgz"
          curl -sL "$ONNX_URL" -o /tmp/onnxruntime.tgz
          tar xzf /tmp/onnxruntime.tgz -C /tmp
          echo "ONNXRUNTIME_ROOT=/tmp/onnxruntime-osx-${ONNX_ARCH}-1.20.1" >> "$GITHUB_ENV"

      - name: ONNX-enabled build smoke (Phase 22)
        run: |
          cmake -B build-onnx -DCMAKE_BUILD_TYPE=Release \
            -DMA_ENABLE_ONNX=ON \
            -DONNXRUNTIME_ROOT="$ONNXRUNTIME_ROOT" \
            -DMA_BUILD_TESTS=OFF \
            -DMA_BUILD_STANDALONE=OFF
          cmake --build build-onnx --config Release --parallel
          echo "ONNX-enabled build smoke passed"

      - name: Prep MIDI smoke (Phase 9)
        run: |
          python3 training/prep_midi.py --input training/fixtures/minimal.mid --output /tmp/ci_prep_out.json
          test -s /tmp/ci_prep_out.json
        continue-on-error: true
